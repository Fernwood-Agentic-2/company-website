<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fernwood Agentic</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inria+Serif:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #FEFCFB;
            color: black;
            font-family: 'Inria Serif', serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 10vh;
            cursor: default;
        }

        * {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        *:focus {
            outline: none;
        }

        .container {
            text-align: center;
            max-width: 800px;
            padding: 40px 20px;
            width: 100%;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 300;
            margin-bottom: 1rem;
            letter-spacing: 0.02em;
            text-align: center;
        }

        .navigation {
            margin-bottom: 3rem;
            text-align: center;
        }

        .nav-links {
            display: flex;
            flex-direction: row;
            justify-content: center;
            gap: 3.5rem;
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .nav-links a {
            color: black;
            text-decoration: none;
            font-size: 1.4rem;
            font-weight: 300;
            position: relative;
            transition: all 0.3s ease;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 1px;
            background-color: black;
            transition: width 0.3s ease;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .nav-links a.disabled {
            color: #aaa;
            pointer-events: none;
            cursor: default;
        }

        .nav-links a.disabled::after {
            display: none;
        }

        .fern-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 2rem;
            margin-left: -50px; /* Shift left to align under title text */
        }

        .fern-placeholder {
            width: 400px;
            height: 300px;
            border: 2px dashed #ccc;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            font-style: italic;
            background-color: rgba(255, 255, 255, 0.5);
        }

        /* Responsive design */
        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }

            .nav-links {
                gap: 1.2rem;
                flex-direction: column;
                align-items: center;
            }

            .nav-links a {
                font-size: 1.1rem;
            }

            .fern-container {
                margin-left: 0;
            }

            .fern-container img {
                max-width: 90vw;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>fernwood agentic</h1>
        
        <nav class="navigation">
            <ul class="nav-links">
                <li><a href="/about">about</a></li>
                <li><a href="/spatial">spatial</a></li>
                <li><a href="/proteknon/login" class="disabled">living index</a></li>
            </ul>
        </nav>
        
        <div class="fern-container">
            <!-- Replace this placeholder with your fern PNG -->
            <img src="ui/images/fern.png" alt="Fern illustration" style="max-width: 100%; height: auto;">
        </div>
    </div>
</body>
</html>
